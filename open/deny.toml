# cargo-deny configuration. Validated in CI in a later pass (not this scaffold).
# Permissive-only, ZERO copyleft (GPL/LGPL/AGPL/MPL all intentionally absent).

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"

[advisories]
yanked = "warn"

[sources]
unknown-git = "deny"
required-git-spec = "rev"
allow-git = [
    "https://github.com/OxideAV/oxideav-mp3",
]
