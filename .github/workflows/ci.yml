name: Cross-platform CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  LIBVPX_VERSION: "1.16.0"
  LIBVPX_SOURCE_SHA256: "7a479a3c66b9f5d5542a4c6a1b7d3768a983b1e5c14c60a9396edc9b649e015c"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  platform-build:
    name: ${{ matrix.lane }}
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.experimental }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: ci-macos-26-arm64
            runner: macos-26
            experimental: false
          - lane: ci-macos-15-x64
            runner: macos-15-intel
            experimental: false
          - lane: ci-windows-2025-x64
            runner: windows-2025
            experimental: false
          - lane: ci-ubuntu-26-x64
            runner: ubuntu-26.04
            experimental: true
          - lane: ci-ubuntu-24-x64
            runner: ubuntu-24.04
            experimental: false

    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: "1"

    defaults:
      run:
        shell: bash
        working-directory: open

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install declared Rust toolchain
        run: rustup toolchain install stable --profile minimal --component rustfmt --component clippy

      - name: Install Linux media build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes libva-dev nasm

      - name: Install macOS media build dependencies
        if: runner.os == 'macOS'
        run: brew install nasm

      - name: Build approved libvpx runtime
        if: runner.os != 'Windows'
        run: |
          archive="$RUNNER_TEMP/libvpx-$LIBVPX_VERSION.tar.gz"
          source="$RUNNER_TEMP/libvpx-$LIBVPX_VERSION"
          prefix="$RUNNER_TEMP/libvpx"
          curl --fail --location --silent --show-error \
            "https://github.com/webmproject/libvpx/archive/refs/tags/v$LIBVPX_VERSION.tar.gz" \
            --output "$archive"
          echo "$LIBVPX_SOURCE_SHA256  $archive" | shasum --algorithm 256 --check
          tar --extract --gzip --file "$archive" --directory "$RUNNER_TEMP"
          pushd "$source"
          ./configure \
            --prefix="$prefix" \
            --disable-docs \
            --disable-examples \
            --disable-tools \
            --disable-unit-tests \
            --enable-shared \
            --enable-vp9-highbitdepth
          make --jobs 2
          make install
          popd
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            echo "SUPERI_LIBVPX_PATH=$prefix/lib/libvpx.12.dylib" >> "$GITHUB_ENV"
          else
            echo "SUPERI_LIBVPX_PATH=$prefix/lib/libvpx.so.12" >> "$GITHUB_ENV"
          fi

      - name: Record build identity
        run: |
          rustc --version --verbose
          cargo --version --verbose
          rustup show active-toolchain
          git rev-parse HEAD

      - name: Enforce open product boundary
        run: cargo run --locked -p superi-boundary-tool -- check .

      - name: Build open workspace
        run: cargo build --workspace --locked

      - name: Check open workspace formatting
        run: cargo fmt --all -- --check

      - name: Test open workspace
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            # Native codec lifecycle tests require a physical macOS hardware lane.
            cargo test --workspace --locked -- \
              --skip h264_native_roundtrip_preserves_timing_and_external_frame_ownership \
              --skip hevc_and_every_advertised_prores_profile_complete_native_roundtrips \
              --skip aac_audio_converter_roundtrip_preserves_sample_timing_and_channel_layout
          else
            cargo test --workspace --locked
          fi

      - name: Build optional platform codec configuration
        run: cargo build --locked -p superi-cli --features os-codecs

      - name: Test optional platform codec configuration
        run: cargo test --locked -p superi-cli --features os-codecs

      - name: Lint open workspace
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test open workspace documentation
        run: cargo test --workspace --doc --locked

      - name: Validate canonical fixtures
        run: cargo run --locked -p superi-fixture-tool -- check test-fixtures

      - name: Run canonical editorial slice
        run: cargo run --locked -p superi-cli -- slice run --scenario superi.slice.canonical.v1 --artifact-dir "$RUNNER_TEMP/superi-slice-artifacts" --report "$RUNNER_TEMP/superi-slice-report.json"

  extended-linux-build:
    name: ci-ubuntu-22-x64
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: "1"

    defaults:
