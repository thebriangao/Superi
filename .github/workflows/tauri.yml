name: Tauri Rust CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tauri-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tauri-rust:
    name: ${{ matrix.lane }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: tauri-macos-26-arm64
            runner: macos-26
          - lane: tauri-macos-15-x64
            runner: macos-15-intel
          - lane: tauri-windows-2025-x64
            runner: windows-2025
          - lane: tauri-ubuntu-24-x64
            runner: ubuntu-24.04

    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: "1"

    defaults:
      run:
        shell: bash
        working-directory: app/src-tauri

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install declared Node.js version
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: app/.node-version
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install locked frontend dependencies
        working-directory: app
        run: npm ci

      - name: Build production frontend
        working-directory: app
        run: npm run build

      - name: Install Tauri development libraries
        if: runner.os == 'Linux'
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            wget

      - name: Install declared Rust toolchain
        run: rustup toolchain install stable --profile minimal --component rustfmt --component clippy

      - name: Record native build identity
        run: |
          rustc --version --verbose
          cargo --version --verbose
          rustup show active-toolchain
          git rev-parse HEAD

      - name: Check Tauri Rust formatting
        run: cargo fmt -- --check

      - name: Test Tauri Rust host
        run: cargo test --locked

      - name: Lint Tauri Rust host
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Compile native Tauri host
        run: cargo build --locked --bin superi-desktop
