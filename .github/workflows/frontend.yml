name: Frontend CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: frontend-typecheck-and-build
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    defaults:
      run:
        shell: bash
        working-directory: ci/frontend-smoke

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install declared Node.js version
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: ci/frontend-smoke/.node-version
          cache: npm
          cache-dependency-path: ci/frontend-smoke/package-lock.json

      - name: Record frontend toolchain identity
        run: |
          node --version
          npm --version
          git rev-parse HEAD

      - name: Install locked frontend dependencies
        run: npm ci

      - name: Typecheck frontend contract
        run: npm run typecheck

      - name: Build production frontend contract
        run: npm run build

      - name: Verify frontend CI contract and bundle
        run: npm test
